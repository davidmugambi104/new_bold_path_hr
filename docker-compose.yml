version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: boldpath-postgres
    environment:
      POSTGRES_DB: boldpath_hr
      POSTGRES_USER: boldpath_user
      POSTGRES_PASSWORD: your_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # Node.js Application
  app:
    build: .
    container_name: boldpath-hr-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=boldpath_hr
      - DB_USER=boldpath_user
      - DB_PASSWORD=your_secure_password
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    restart: unless-stopped

  # NGINX Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: boldpath-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data: