name: Deploy to Vercel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Environment Variables
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is missing from GitHub Secrets!"
            echo ""
            echo "To fix this issue:"
            echo "1. Go to https://vercel.com/account/tokens and create a new token"
            echo "2. Copy the token value"
            echo "3. Go to your GitHub repository settings"
            echo "4. Navigate to Settings > Secrets and variables > Actions"
            echo "5. Click 'New repository secret'"
            echo "6. Name it 'VERCEL_TOKEN' and paste the token value"
            echo "7. Click 'Add secret'"
            echo "8. Re-run this workflow"
            echo ""
            echo "Note: The token should have at least the 'Deployments' scope."
            exit 1
          fi
          echo "All required environment variables are present."
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Dependencies (if package-lock.json exists)
        run: |
          if [ -f "package-lock.json" ]; then
            echo "Installing dependencies..."
            npm ci
          else
            echo "No package-lock.json found, skipping dependency installation"
          fi
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Environment Information
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        continue-on-error: true
      
      - name: Deploy to Vercel
        run: |
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
